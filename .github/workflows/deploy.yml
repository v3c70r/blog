name: Deploy Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure MathJax
        run: |
          mkdir -p source/_data
          cat > source/_data/head.swig << 'EOF'
<script>
  window.MathJax = {
    tex: {
      inlineMath: {'[+]': [['$', '$'], ['\\(', '\\)']]}
    },
    startup: {
      pageReady: () => MathJax.startup.defaultPageReady()
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
EOF

      - name: Enable MathJax in theme
        run: |
          sed -i 's/#head: source/_data\/head.swig/head: source\/_data\/head.swig/' node_modules/hexo-theme-next/_config.yml
          sed -i '/mathjax:/,/enable:/{s/enable: false/enable: true/}' node_modules/hexo-theme-next/_config.yml

      - name: Generate Hexo site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages